name: 🌿 Streamlit Keep-Alive (Playwright)

on:
  schedule:
    # Runs every 6 hours — well under the 12h sleep threshold
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:  # Manual trigger available in GitHub Actions tab

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright and dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run keep-alive script
        run: python keepalive.py

